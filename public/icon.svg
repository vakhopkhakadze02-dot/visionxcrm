<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </radialGradient>
    
    <!-- Indigo/Violet Gradient for Vision Logo -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>

    <!-- Cyan/Teal Accent Gradient for X wing -->
    <linearGradient id="accentGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>

    <!-- Soft Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />
  
  <!-- Subtle Outer Border -->
  <rect x="4" y="4" width="504" height="504" rx="108" fill="none" stroke="#334155" stroke-width="4" opacity="0.4" />

  <!-- Abstract Graphic Group -->
  <g transform="translate(4, 4)" filter="url(#glow)">
    <!-- Right wing of the "X" (Teal/Cyan) -->
    <path d="M 340,140 
             L 390,190 
             L 210,370 
             L 160,320 
             Z" 
          fill="url(#accentGrad)" 
          opacity="0.85" />

    <!-- Left wing of "X" / "V" shape (Indigo/Violet) -->
    <path d="M 120,140 
             L 210,140 
             L 340,370 
             L 250,370 
             Z" 
          fill="url(#logoGrad)" />

    <!-- Dynamic Overlay Intersect (adds 3D glassmorphic depth) -->
    <path d="M 230,215 
             L 282,215 
             L 200,360 
             L 148,360 
             Z" 
          fill="#ffffff" 
          opacity="0.15" />
          
    <!-- Core Glow Dot -->
    <circle cx="256" cy="256" r="16" fill="#ffffff" filter="blur(4px)" opacity="0.8" />
  </g>
</svg>
